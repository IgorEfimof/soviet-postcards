<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Советские открытки</title>
  <style>
    /* Ваши стили остаются без изменений */
  </style>
</head>
<body>
  <header>
    <h1>Магазин советских открыток</h1>
    <button class="cart-icon-button" onclick="showCart()" title="Корзина">
      🛒
      <span class="cart-count" id="cart-count" style="display:none;">0</span>
    </button>
  </header>
   <main id="product-list"></main>

  <div id="cart-modal" onclick="hideCart(event)">
    <div id="cart-content">
      <h2>Корзина</h2>
      <ul id="cart-items"></ul>
      <div id="cart-footer">
        <p><strong>Итого: <span id="cart-total">0</span> руб.</strong></p>
        <button onclick="clearCart()">Очистить корзину</button>
        <button onclick="orderNow()">Оформить заказ</button>
      </div>
    </div>
  </div>

  <footer>
    © 2024 СОВЕТСКИЕ ОТКРЫТКИ<br>
    Все права защищены<br>
    Написать в <a href="https://t.me/IgEfR" target="_blank">Telegram</a>
  </footer>

  <script>
    async function loadProducts() {
      const response = await fetch('data/products.json');
      const products = await response.json();
      const container = document.getElementById('product-list');
      products.forEach(product => {
        const card = document.createElement('div');
        card.className = 'card';
        card.innerHTML = `
          <img src="img/${product.image}" alt="${product.name}" />
          <h3>${product.name}</h3>
          <p>${product.description}</p>
          <p><strong>${product.price} руб.</strong></p>
          <button onclick="addToCart('${product.name}', ${product.price}, '${product.image}')">В корзину</button>
        `;
        container.appendChild(card);
      });
      updateCartCount();
    }

    function addToCart(name, price, image) {
      const cart = JSON.parse(localStorage.getItem('cart') || '[]');
      cart.push({ name, price, image });
      localStorage.setItem('cart', JSON.stringify(cart));
      alert(`Товар \"${name}\" добавлен в корзину.`);
      updateCartCount();
    }

    function updateCartCount() {
      const cart = JSON.parse(localStorage.getItem('cart') || '[]');
      const counter = document.getElementById('cart-count');
      if (cart.length > 0) {
        counter.style.display = 'inline-block';
        counter.textContent = cart.length;
      } else {
        counter.style.display = 'none';
      }
    }

    function showCart() {
      const cart = JSON.parse(localStorage.getItem('cart') || '[]');
      const list = document.getElementById('cart-items');
      const totalSpan = document.getElementById('cart-total');
      list.innerHTML = '';
      let total = 0;
      if (cart.length === 0) {
        list.innerHTML = '<li>Корзина пуста</li>';
        totalSpan.textContent = '0';
      } else {
        cart.forEach((item, index) => {
          const li = document.createElement('li');
          li.innerHTML = `
            <img src="img/${item.image}" class="cart-thumb" alt="${item.name}" />
            <div class="cart-info">
              ${item.name}<br>${item.price} руб.
            </div>
            <button class="remove" onclick="removeFromCart(${index})">✕</button>
          `;
          total += item.price;
          list.appendChild(li);
        });
        totalSpan.textContent = total;
      }
      document.getElementById('cart-modal').style.display = 'flex';
    }

    function hideCart(event) {
      if (event.target.id === 'cart-modal') {
        document.getElementById('cart-modal').style.display = 'none';
      }
    }

    function clearCart() {
      localStorage.removeItem('cart');
      updateCartCount();
      showCart();
    }

    function removeFromCart(index) {
      const cart = JSON.parse(localStorage.getItem('cart') || '[]');
      cart.splice(index, 1);
      localStorage.setItem('cart', JSON.stringify(cart));
      updateCartCount();
      showCart();
    }

    function orderNow() {
      const cart = JSON.parse(localStorage.getItem('cart') || '[]');
      if (cart.length === 0) {
        alert('Корзина пуста');
        return;
      }
      const message = cart.map(p => `• ${p.name} — ${p.price} руб.%0A📷 https://<твой-сайт>/img/${p.image}`).join('%0A');
      const telegramLink = `https://t.me/IgEfR?text=Хочу заказать открытки:%0A${message}`;
      window.open(telegramLink, '_blank');
    }

    loadProducts();
  </script>
</body>
</html>
